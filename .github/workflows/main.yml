name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: "Promote HML image to PROD"
        required: true
        type: boolean
        default: false

env:
  ACR_NAME: pridregistryhml                          # your ACR name (without .azurecr.io)
  ACR_LOGIN_SERVER: pridregistryhml.azurecr.io
  IMAGE_NAME: prid
  RESOURCE_GROUP_HML: hml
  RESOURCE_GROUP_PROD: prod
  CONTAINER_APP_HML: pridcontainerapp
  CONTAINER_APP_PROD: pridcontainerapp

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build image and push to ACR
  # Runs on every push to main
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag (git SHA)
        id: meta
        run: echo "tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest-hml

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to HML
  # Runs automatically after build
  # ─────────────────────────────────────────────
  deploy-hml:
    name: Deploy to HML
    runs-on: ubuntu-latest
    needs: build
    environment: hml                            # maps to GitHub Environment "hml"

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy to Container App HML
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_HML }}
          resourceGroup: ${{ env.RESOURCE_GROUP_HML }}
          imageToDeploy: ${{ needs.build.outputs.image_tag }}

      # Safety net: force image update explicitly
      - name: Force image update (safety net)
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_HML }} \
            --resource-group ${{ env.RESOURCE_GROUP_HML }} \
            --image ${{ needs.build.outputs.image_tag }}

      - name: Print HML URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_HML }} \
            --resource-group ${{ env.RESOURCE_GROUP_HML }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ HML deployed → https://$URL"

