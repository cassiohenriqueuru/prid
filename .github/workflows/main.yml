name: Build and Deploy
on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: "Promote HML image to PROD"
        required: true
        type: boolean
        default: false

env:
  ACR_NAME: pridregistryhml
  ACR_LOGIN_SERVER: pridregistryhml.azurecr.io
  IMAGE_NAME: prid
  RESOURCE_GROUP: hml                          # single RG shared by both envs
  CONTAINER_APP_HML: pridcontainerappenv      # ← fix: must be different app names
  CONTAINER_APP_PROD: pridcontainerappprod    # ← set your actual prod app name here

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build image and push to ACR
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag (git SHA)
        id: meta
        run: echo "tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest-hml

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to HML
  # Runs automatically after build
  # ─────────────────────────────────────────────
  deploy-hml:
    name: Deploy to HML
    runs-on: ubuntu-latest
    needs: build
    environment: hml
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to HML container app
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_HML }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.build.outputs.image_tag }}

      - name: Print HML URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_HML }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ HML deployed → https://$URL"

  # ─────────────────────────────────────────────
  # JOB 3 — Promote to PROD
  # Only runs on manual trigger with promote_to_prod=true
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: build
    environment: prod
    if: github.event_name == 'workflow_dispatch' && inputs.promote_to_prod == true
    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Deploy image to PROD container app
        run: |
          az containerapp update \
            --name ${{ env.CONTAINER_APP_PROD }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --image ${{ needs.build.outputs.image_tag }}

      - name: Print PROD URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_PROD }} \
            --resource-group ${{ env.RESOURCE_GROUP }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ PROD deployed → https://$URL"
