name: Build and Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      promote_to_prod:
        description: "Promote HML image to PROD"
        required: true
        type: boolean
        default: false

env:
  ACR_NAME: pridregistryhml                          # your ACR name (without .azurecr.io)
  ACR_LOGIN_SERVER: pridregistryhml.azurecr.io
  IMAGE_NAME: prid
  RESOURCE_GROUP_HML: hml
  RESOURCE_GROUP_PROD: prod
  CONTAINER_APP_HML: pridcontainerapp
  CONTAINER_APP_PROD: pridcontainerapp

jobs:
  # ─────────────────────────────────────────────
  # JOB 1 — Build image and push to ACR
  # Runs on every push to main
  # ─────────────────────────────────────────────
  build:
    name: Build & Push Image
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Generate image tag (git SHA)
        id: meta
        run: echo "tag=${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Login to ACR
        run: az acr login --name ${{ env.ACR_NAME }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.meta.outputs.tag }}
            ${{ env.ACR_LOGIN_SERVER }}/${{ env.IMAGE_NAME }}:latest-hml

  # ─────────────────────────────────────────────
  # JOB 2 — Deploy to HML
  # Runs automatically after build
  # ─────────────────────────────────────────────
      deploy-hml:
      name: Deploy to HML
      runs-on: ubuntu-latest
      needs: build
      environment: hml
    
      steps:
        - name: Azure Login
          uses: azure/login@v2
          with:
            creds: ${{ secrets.AZURE_CREDENTIALS }}
    
        - name: Wait for Container App operations to finish
          run: |
            echo "Waiting for Container App provisioning to complete..."
    
            for i in {1..30}; do
              STATE=$(az containerapp show \
                --name ${{ env.CONTAINER_APP_HML }} \
                --resource-group ${{ env.RESOURCE_GROUP_HML }} \
                --query "properties.provisioningState" \
                -o tsv)
    
              echo "Current state: $STATE"
    
              if [ "$STATE" = "Succeeded" ]; then
                echo "Container App ready."
                exit 0
              fi
    
              sleep 20
            done
    
            echo "Timeout waiting for Container App provisioning."
            exit 1
    
        - name: Deploy to Container App HML
          uses: azure/container-apps-deploy-action@v1
          with:
            acrName: ${{ env.ACR_NAME }}
            containerAppName: ${{ env.CONTAINER_APP_HML }}
            resourceGroup: ${{ env.RESOURCE_GROUP_HML }}
            imageToDeploy: ${{ needs.build.outputs.image_tag }}
    
        - name: Print HML URL
          run: |
            URL=$(az containerapp show \
              --name ${{ env.CONTAINER_APP_HML }} \
              --resource-group ${{ env.RESOURCE_GROUP_HML }} \
              --query properties.configuration.ingress.fqdn -o tsv)
    
            echo "✅ HML deployed → https://$URL"

  # ─────────────────────────────────────────────
  # JOB 3 — Deploy to PROD
  # Requires manual approval via GitHub Environment protection rule
  # Promotes the EXACT same image that was deployed to HML
  # ─────────────────────────────────────────────
  deploy-prod:
    name: Deploy to PROD
    runs-on: ubuntu-latest
    needs: [build, deploy-hml]
    environment: prod                           # maps to GitHub Environment "prod" (with required reviewers)

    steps:
      - name: Azure Login
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Promote same image to PROD
        uses: azure/container-apps-deploy-action@v1
        with:
          acrName: ${{ env.ACR_NAME }}
          containerAppName: ${{ env.CONTAINER_APP_PROD }}
          resourceGroup: ${{ env.RESOURCE_GROUP_PROD }}
          imageToDeploy: ${{ needs.build.outputs.image_tag }}   # exact same SHA!

      - name: Tag image as latest-prod in ACR
        run: |
          az acr import \
            --name ${{ env.ACR_NAME }} \
            --source ${{ needs.build.outputs.image_tag }} \
            --image ${{ env.IMAGE_NAME }}:latest-prod \
            --force

      - name: Print PROD URL
        run: |
          URL=$(az containerapp show \
            --name ${{ env.CONTAINER_APP_PROD }} \
            --resource-group ${{ env.RESOURCE_GROUP_PROD }} \
            --query properties.configuration.ingress.fqdn -o tsv)
          echo "✅ PROD deployed → https://$URL"
